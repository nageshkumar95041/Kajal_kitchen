<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Kajal Ki Rasoi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">Kajal Ki Rasoi</a></div>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#menu">Menu</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Sign Up</a></li>
        </ul>
        <div class="nav-right">
            <a href="cart.html" class="nav-cart-icon">Cart (<span id="cart-count">0</span>)</a>
            <div class="menu-toggle" id="mobile-menu">&#9776;</div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="brand-logo">KK</div>
                <h1 class="auth-title">Set a New Password</h1>
                <p class="auth-subtitle">Your new password must be different from previous passwords.</p>
            </div>

            <form class="auth-form" id="reset-password-form">
                <div class="form-group">
                    <label for="reset-password">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reset-password" placeholder="Enter new password" required>
                        <button type="button" class="password-toggle" id="password-toggle-1">👁️</button>
                    </div>
                    <div class="error-text" id="reset-password-error"></div>
                </div>
                <div class="form-group">
                    <label for="confirm-reset-password">Confirm New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-reset-password" placeholder="Confirm your new password" required>
                        <button type="button" class="password-toggle" id="password-toggle-2">👁️</button>
                    </div>
                    <div class="error-text" id="confirm-password-error"></div>
                </div>
                <button type="submit" class="btn btn-full" id="reset-submit-btn" disabled>Reset Password</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
