<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Kajal Ki Rasoi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">Kajal Ki Rasoi</a></div>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#menu">Menu</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Sign Up</a></li>
        </ul>
        <div class="nav-right">
            <a href="cart.html" class="nav-cart-icon">Cart (<span id="cart-count">0</span>)</a>
            <div class="menu-toggle" id="mobile-menu">&#9776;</div>
        </div>
    </nav>

    <section class="payment-page">
        <div class="payment-container">
            <h2>Checkout Details</h2>
            <div id="checkout-summary" style="margin-bottom: 1.5rem; padding: 1.5rem; background: #f8f9fa; border-radius: 8px; text-align: center; color: #2c3e50; line-height: 1.4;">
                <!-- Summary dynamically injected here -->
            </div>
            <form id="payment-form" class="payment-form">
                <input type="hidden" id="customer-lat">
                <input type="hidden" id="customer-lng">
                <input type="hidden" id="delivery-fee" value="0">
                <!-- Hidden fields for rich address data -->
                <input type="hidden" name="lat"          id="hidden_lat">
                <input type="hidden" name="lng"          id="hidden_lng">
                <input type="hidden" name="full_address" id="hidden_full_address">
                <input type="hidden" name="pincode"      id="hidden_pincode">
                <input type="hidden" name="place_id"     id="hidden_place_id">
                <input type="hidden" name="state"        id="hidden_state">

                <input type="text" id="card-name" placeholder="Full Name" required style="padding: 15px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc;">
                
                <div id="guest-contact-section">
                    <h3 style="font-size: 1.1rem; color: #2c3e50; margin-top: 1rem;">Contact Info (Required for Guest)</h3>
                    <input type="text" id="guest-contact" placeholder="Email or Phone Number" required style="padding: 15px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc;">
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                    <h3 style="font-size: 1.1rem; color: #2c3e50;">Delivery Address</h3>
                    <button type="button" id="locate-btn" style="background: #e67e22; color: #fff; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: background 0.3s;">📍 Map Locator</button>
                </div>
                <!-- NEW GOOGLE MAPS SEARCH BAR -->
                <div class="form-group" id="address-search-container" style="position: relative; margin-top: 1rem;">
                    <div style="position: relative;">
                        <input type="text" id="address-search" placeholder="Search your area, street or landmark…" autocomplete="off" style="padding: 15px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; padding-right: 80px;">
                        <button type="button" id="clear-address-search-btn" title="Clear search" style="position: absolute; top: 50%; right: 45px; transform: translateY(-50%); background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999; padding: 0; display: none;">&times;</button>
                        <button type="button" id="use-current-location-btn" title="Use my current location" style="position: absolute; top: 50%; right: 10px; transform: translateY(-50%); background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #666; padding: 0;">📍</button>
                    </div>
                    <div id="autocomplete-suggestions"></div>
                    <div id="address-autofill-msg" style="font-size: 0.85rem; margin-top: 5px; color: #2ecc71; opacity: 0; transition: opacity 0.3s; height: 1em;"></div>
                </div>
                <!-- END NEW GOOGLE MAPS SEARCH BAR -->
                <input type="text" id="address-flat" placeholder="Flat, House no., Building, Apartment" style="padding: 15px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc;" onblur="getDeliveryEstimate()">
                <div id="flat-helper-text" style="font-size: 12px; color: #888; margin-top: 4px; margin-bottom: 8px; display: none;">Enter your flat or house number to complete the address</div>
                <input type="text" id="address-area" placeholder="Area, Street, Sector, Village" required style="padding: 15px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc;" onblur="getDeliveryEstimate()">
                <input type="text" id="address-landmark" placeholder="Nearby Landmark (Optional)" style="padding: 15px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc;">
                <div class="form-row">
                    <input type="text" id="address-city" placeholder="Town/City" required style="padding: 15px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc;" onblur="getDeliveryEstimate()">
                    <input type="text" id="address-pincode" placeholder="Pincode" required style="padding: 15px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc;" onblur="getDeliveryEstimate()">
                </div>
                <div id="delivery-estimate-msg" style="font-size: 0.9rem; color: #27ae60; font-weight: bold; margin-top: 5px; text-align: center;"></div>
                
                <h3 id="coupon-section-heading" style="font-size: 1.1rem; color: #2c3e50; margin-top: 1rem;">Have a Coupon?</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="coupon-code" placeholder="e.g. APNA50" style="padding: 10px; flex: 1; border: 1px solid #ccc; border-radius: 5px;">
                    <button type="button" class="btn" style="padding: 10px;" onclick="applyCoupon()">Apply</button>
                </div>
                <div id="coupon-msg" style="font-size: 0.85rem; margin-top: 5px;"></div>

                <h3 style="font-size: 1.1rem; color: #2c3e50; margin-top: 1rem;">Payment Method</h3>
                <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem;">
                    <label style="cursor: pointer;"><input type="radio" name="pay_method" value="online" checked> Pay Online (Cards via Stripe)</label>
                    <label style="cursor: pointer;"><input type="radio" name="pay_method" value="cod"> Cash on Delivery (COD)</label>
                </div>

                <button id="submit-payment-btn" class="btn" style="width: 100%; margin-top: 1rem; padding: 15px; font-size: 1.1rem; border-radius: 8px;">Proceed to Payment</button>
                <div id="payment-message" style="color: red; text-align: center; margin-top: 1rem;"></div>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2023 Kajal Ki Rasoi. All Rights Reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
