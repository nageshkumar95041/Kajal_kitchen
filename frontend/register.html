<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Kajal Ki Rasoi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">Kajal Ki Rasoi</a></div>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#menu">Menu</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html" style="color: #e67e22;">Sign Up</a></li>
        </ul>
    </nav>

    <section class="auth-page">
        <div class="auth-container">
            <h2>Create Account</h2>
            <form class="auth-form" onsubmit="handleRegistration(event)">
                <input type="text" id="reg-name" placeholder="Full Name" required>
                <input type="text" id="reg-contact" placeholder="Email or Phone Number" required>
                <input type="password" id="reg-password" placeholder="Password" minlength="6" required>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Sign Up</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2023 Kajal Ki Rasoi. All Rights Reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
