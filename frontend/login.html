<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kajal Ki Rasoi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">Kajal Ki Rasoi</a></div>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#menu">Menu</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="login.html" style="color: #e67e22;">Login</a></li>
            <li><a href="register.html">Sign Up</a></li>
        </ul>
        <div class="nav-right">
            <a href="cart.html" class="nav-cart-icon">Cart (<span id="cart-count">0</span>)</a>
            <div class="menu-toggle" id="mobile-menu">&#9776;</div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="brand-logo">KK</div>
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to continue to Kajal Kitchen</p>
            </div>

            <form class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-contact">Email address or Phone</label>
                    <input type="text" id="login-contact" placeholder="Enter your email or phone" required>
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem;">
                        <label for="login-password" style="margin-bottom: 0;">Password</label>
                        <a href="#" class="forgot-password-link" onclick="showForgotPasswordModal(event)">Forgot password?</a>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" id="password-toggle">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-full">Sign in</button>
            </form>

            <div class="divider">or</div>

            <div id="google-btn-container">
                <!-- Google Sign-In button will be rendered here by script.js -->
            </div>
            
            <div class="auth-footer">
                <p>New here? <a href="register.html">Create an account</a></p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
